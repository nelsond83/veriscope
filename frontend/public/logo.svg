<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 64">
  <!-- Scope ring outer -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#22d3ee" stroke-width="1.8"/>
  <!-- Scope ring inner (lens) -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.45"/>
  <!-- Crosshair ticks -->
  <line x1="32" y1="5" x2="32" y2="14" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="59" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="5" y1="32" x2="14" y2="32" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="59" y2="32" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center checkmark (emerald) -->
  <path d="M 24 32 L 30 39 L 41 24" fill="none" stroke="#10b981" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="74" y="31" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">Veri<tspan fill="#22d3ee" font-weight="400">scope</tspan></text>
  <!-- Tagline -->
  <text x="75" y="49" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="8.5" fill="#64748b" letter-spacing="3.5">DUE DILIGENCE</text>
</svg>
