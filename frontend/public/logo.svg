<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 64">
  <!-- Scope ring outer — USMC Gold -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#FFB81C" stroke-width="1.8"/>
  <!-- Scope ring inner (lens) -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#FFB81C" stroke-width="1.2" opacity="0.5"/>
  <!-- Crosshair ticks — Gold -->
  <line x1="32" y1="5" x2="32" y2="14" stroke="#FFB81C" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="59" stroke="#FFB81C" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="5" y1="32" x2="14" y2="32" stroke="#FFB81C" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="59" y2="32" stroke="#FFB81C" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center checkmark — USMC Scarlet -->
  <path d="M 24 32 L 30 39 L 41 24" fill="none" stroke="#C8102E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="74" y="31" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Veri<tspan fill="#FFB81C" font-weight="400">scope</tspan></text>
  <!-- Tagline -->
  <text x="75" y="49" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="8.5" fill="#9A9A9F" letter-spacing="3.5">DUE DILIGENCE</text>
</svg>
