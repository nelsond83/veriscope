<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background — Scarlet -->
  <rect width="64" height="64" rx="10" fill="#C8102E"/>
  <!-- Scope ring outer — Gold -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#FFB81C" stroke-width="2.4"/>
  <!-- Scope ring inner (lens) — Gold -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#FFB81C" stroke-width="1.4" opacity="0.7"/>
  <!-- Crosshair ticks — Gold -->
  <line x1="32" y1="7"  x2="32" y2="15" stroke="#FFB81C" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="32" y1="49" x2="32" y2="57" stroke="#FFB81C" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="7"  y1="32" x2="15" y2="32" stroke="#FFB81C" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="49" y1="32" x2="57" y2="32" stroke="#FFB81C" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Center checkmark — White (visible at 16px) -->
  <path d="M 23 32 L 29 39 L 42 23" fill="none" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
